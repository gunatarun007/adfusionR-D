pipeline:
  # Path to the input video file
  video_path: "input/demo.mp4"
  # Path to the output video file
  output_path: "output/final.mp4"
  # Directory where intermediate results are stored
  cache_dir: "cache"
  # Directory where experiment logs, timings, and metadata are saved
  experiments_dir: "experiments"
  # Hardware device to use: "cpu", "cuda", or "mps"
  device: "cpu"
  # Batch size for stage processing
  batch_size: 4
  # Target frame rate for video processing
  frame_rate: 30
  # Target resolution [width, height] for the output video
  resolution: [1280, 720]

stages:
  frame_extraction:
    enabled: true
  object_detection:
    enabled: true
    # Text prompt sent to GroundingDINO for zero-shot detection
    target_class: "person"
  track_objects:
    enabled: true
  estimate_depth:
    enabled: true
  reconstruct_object:
    enabled: true
  remove_object:
    enabled: true
  render_brand:
    enabled: true
    # Path to the brand visual asset (e.g. logo or overlay)
    brand_logo_path: "input/logo.png"
  harmonize:
    enabled: true
  qa:
    enabled: true
  export_video:
    enabled: true

# Detection backend: GroundingDINO + SAM2 (fully open-source, no HF token required)
detection:
  # GroundingDINO SwinB checkpoint (public GitHub release download)
  gdino_checkpoint: "models/groundingdino_swinb_cogcoor.pth"
  # SAM2.1 Hiera-Large checkpoint (public Meta CDN download)
  sam2_checkpoint: "models/sam2.1_hiera_large.pt"
  # SAM2 config identifier (relative to third_party/sam2/)
  sam2_config: "configs/sam2.1/sam2.1_hiera_l.yaml"
  # GroundingDINO detection thresholds
  box_threshold: 0.35
  text_threshold: 0.25
  # Compute device: "cuda" (recommended on RunPod) or "cpu"
  device: "cuda"
